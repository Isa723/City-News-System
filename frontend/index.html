<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kocaeli Yerel Haberler & Harita</title>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar Navigation / Filters -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <i class="fa-solid fa-map-location-dot"></i>
                <h2>Kocaeli News Map</h2>
            </div>
            
            <div class="header-actions">
                <button id="themeToggleBtn" class="icon-btn" title="Light/Dark Mode">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
            
            <p class="subtitle">Canlı Yerel Haber Akışı</p>
            
            <div class="filter-section">
                <h3><i class="fa-solid fa-filter"></i> Filtrele</h3>
                
                <div class="form-group">
                    <label>Haber Türü</label>
                    <select id="categoryFilter" class="glass-input">
                        <option value="all">Tümü Seçili</option>
                        <option value="Trafik Kazası">Trafik Kazası</option>
                        <option value="Yangın">Yangın</option>
                        <option value="Elektrik Kesintisi">Elektrik Kesintisi</option>
                        <option value="Hırsızlık">Hırsızlık</option>
                        <option value="Kültürel Etkinlikler">Kültürel Etkinlikler</option>
                        <option value="Diğer">Diğer / Sınıflandırılamayan</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>İlçe</label>
                    <select id="locationFilter" class="glass-input">
                        <option value="all">Tüm İlçeler</option>
                        <option value="İzmit">İzmit</option>
                        <option value="Gebze">Gebze</option>
                        <option value="Gölcük">Gölcük</option>
                        <option value="Derince">Derince</option>
                        <option value="Darıca">Darıca</option>
                        <option value="Körfez">Körfez</option>
                        <option value="Kartepe">Kartepe</option>
                        <option value="Başiskele">Başiskele</option>
                        <option value="Karamürsel">Karamürsel</option>
                        <option value="Kandıra">Kandıra</option>
                        <option value="Dilovası">Dilovası</option>
                        <option value="Çayırova">Çayırova</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Tarih</label>
                    <select id="dateFilter" class="glass-input">
                        <option value="all">Tüm Zamanlar (Son 3 Gün)</option>
                        <option value="today">Bugün</option>
                        <option value="yesterday">Dün</option>
                    </select>
                </div>
                
                <button id="applyFiltersBtn" class="primary-btn">Filtreleri Uygula</button>
            </div>
            
            <div class="stats-section">
                <button id="triggerScraperBtn" class="secondary-btn pulse-animation">
                    <i class="fa-solid fa-rotate"></i> Yeni Haberleri Çek
                </button>

                <div class="stat-box mt-3">
                    <h4 id="totalNewsStat">0</h4>
                    <span>Haritadaki Haber</span>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container">
            <div id="map"></div>
        </main>
        
    </div>

    <!-- Scripts -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Custom Logic -->
    <script src="js/app.js"></script>
</body>
</html>
